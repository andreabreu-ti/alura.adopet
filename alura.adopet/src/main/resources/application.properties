spring.application.name=alura.adopet

spring.datasource.url=jdbc:sqlserver://${JAVA_HOST};databaseName=alura.adopet;encrypt=true;trustServerCertificate=true;
spring.datasource.username=${JAVA_USER}
spring.datasource.password=${JAVA_PASSWORD}

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect